<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Website Estimator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    background: #121212;
    padding: 40px 30px;
    border-radius: 20px;
    width: 95%;
    max-width: 700px;
    box-shadow: 0 10px 40px rgba(0, 170, 255, 0.2);
    border: 1px solid #1f1f1f;
}

h1 {
    text-align: center;
    color: #00aaff;
    margin-bottom: 25px;
    font-size: 28px;
    letter-spacing: 1px;
}

label {
    font-size: 14px;
    color: #aaa;
    margin-top: 10px;
}

input {
    width: 100%;
    padding: 14px 12px;
    margin: 8px 0 20px;
    border-radius: 12px;
    border: 1px solid #333;
    background: #1e1e1e;
    color: #fff;
    font-size: 14px;
    transition: border 0.3s, background 0.3s;
}

input:focus {
    outline: none;
    border-color: #00aaff;
    background: #232323;
}

.checkbox-group label {
  display: flex;
  align-items: flex-start;   /* aligns checkbox with text properly */
  gap: 10px;                 /* space between checkbox and text */
  cursor: pointer;
  color: #ddd;
  margin-top: 16px;
  font-size: 14px;
}

.checkbox-group label input {
  width: 18px;
  height: 18px;
  accent-color: #00aaff;
  cursor: pointer;
  margin-top: 3px;           /* slight vertical adjustment */
}

.checkbox-group label .text-wrapper {
  display: flex;
  flex-direction: column;
}

.checkbox-group label .desc {
  font-size: 12px;
  color: #7aaedb;
  margin-top: 4px;
  line-height: 1.4;
}
button {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    font-size: 16px;
    transition: 0.3s all;
}

.calculate-btn {
    background: #00aaff;
    color: #fff;
}

.calculate-btn:hover {
    background: #008ecc;
}

.pdf-btn {
    background: #1e1e1e;
    color: #00aaff;
    border: 1px solid #00aaff;
}

.pdf-btn:hover {
    background: #00aaff;
    color: #000;
}

.result-box {
    margin-top: 30px;
    background: #1a1a1a;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #00aaff;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

th {
    background: #00aaff;
    color: #fff;
    padding: 12px;
    text-align: left;
    border-radius: 8px 8px 0 0;
}

td {
    padding: 12px;
    border-bottom: 1px solid #333;
}

tr:hover {
    background: #222;
}

.total-row td {
    font-size: 16px;
    font-weight: bold;
    color: #ffd700;
}

.base-package-info {
  background-color: #1e1e1e;
  border: 1px solid #00aaff;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 25px;
  color: #00aaff;
  font-size: 14px;
  line-height: 1.5;
}
.base-package-info h3 {
  margin-top: 0;
  margin-bottom: 10px;
  font-size: 16px;
}
.base-package-info ul {
  margin: 0;
  padding-left: 20px;
}
.base-package-info li {
  margin-bottom: 6px;
}
</style>
</head>

<body>

<div class="container">
<h1>Website Budget Estimator</h1>

<div class="base-package-info">
  <h3>Base Package Includes:</h3>
  <ul>
    <li>Home page</li>
    <li>About Us page</li>
    <li>Program page</li>
    <li>Contact page</li>
    <li>Venue page</li>
    <li>Sponsor page</li>
    <li>Committee page</li>
    <li>Speaker page</li>
    <li>Register page</li>
    <li>Login page </li>
  </ul>
</div>

<label>Number of Pages</label>
<input type="number" id="pages" value="10" min="1">

<label>Delivery Timeline of version 1 of the Website (Days)</label>
<input type="number" id="days" value="7" min="1">

<div class="checkbox-group">
  <label>
    <input type="checkbox" id="contentUpdates">
      <div class="text-wrapper">
        Content Updates Package (+₹3000)
        <div class="desc">
        Includes minor edits such as image swaps, text corrections, adding or removing content on existing pages, and fixing typos. (Only applicable to content and images provided by the client.)
        </div>
    </div>
    </label>

  <label>
    <input type="checkbox" id="majorChanges">
    <div class="text-wrapper">
        Major Design/Feature Changes (+₹5000)
        <div class="desc">
        Covers bigger work like new pages, complex layout changes, functionality changes, etc.
        </div>
    </div>
  </label>

    <label>
    <input type="checkbox" id="database">
    <div class="text-wrapper">
        Database or Backend Changes (+₹1000)
        <div class="desc">
        For backend work like database setup, email automation, integrations.
        </div>
    </div>
    </label>

    <!-- <label>
    <input type="checkbox" id="email">
    <div class="text-wrapper">
        Auto Email Setup (+₹1000)
    </div>
    </label> -->
</div>
<button class="calculate-btn" onclick="calculate()">Calculate Estimate</button>

<div class="result-box" id="resultBox" style="display:none;">
<table>
<thead>
<tr>
<th>Description</th>
<th>Amount (₹)</th>
</tr>
</thead>
<tbody id="pricingTable">
</tbody>
</table>

<button class="pdf-btn" onclick="downloadPDF()">Download PDF</button>
</div>

</div>

<script>
let finalTotal = 0;

function calculate() {
    let pages = parseInt(document.getElementById("pages").value);
    let days = parseInt(document.getElementById("days").value);

    let basePrice = 10000;
    let extraPageCost = pages > 10 ? (pages - 10) * 800 : 0;

    let urgencyMultiplier = 0;
    if (days <= 2) urgencyMultiplier = 0.35;
    else if (days <= 4) urgencyMultiplier = 0.20;
    else if (days <= 6) urgencyMultiplier = 0.10;

    let addonCost = 0;
    if (document.getElementById("majorChanges").checked) addonCost += 5000;
    if (document.getElementById("contentUpdates").checked) addonCost += 3000;
    if (document.getElementById("database").checked) addonCost += 1000;
    if (document.getElementById("email").checked) addonCost += 1000;

    let subtotal = basePrice + extraPageCost;
    let urgencyCost = subtotal * urgencyMultiplier;

    finalTotal = subtotal + urgencyCost + addonCost;

    document.getElementById("resultBox").style.display = "block";

    document.getElementById("pricingTable").innerHTML = `
        <tr><td>Base Package (10 Pages)</td><td>${basePrice}</td></tr>
        <tr><td>Extra Pages</td><td>${extraPageCost}</td></tr>
        <tr><td>Urgency Charges</td><td>${urgencyCost.toFixed(2)}</td></tr>
        <tr><td>Add-ons</td><td>${addonCost}</td></tr>
        <tr class="total-row"><td>Total Estimate</td><td>${finalTotal.toFixed(2)}</td></tr>
    `;
}

async function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    const pageWidth = doc.internal.pageSize.getWidth();
    const pageHeight = doc.internal.pageSize.getHeight();

    // ===== OFF WHITE BACKGROUND =====
    doc.setFillColor(248, 249, 252); // soft off-white
    doc.rect(0, 0, pageWidth, pageHeight, "F");

    // ===== BLUE HEADER =====
    doc.setFillColor(0, 170, 255);
    doc.rect(0, 0, pageWidth, 30, "F");

    doc.setTextColor(255, 255, 255);
    doc.setFontSize(18);
    doc.text("YOUR COMPANY NAME", 20, 18);

    // Reset text color
    doc.setTextColor(30, 30, 30);

    // ===== TITLE =====
    doc.setFontSize(16);
    doc.text("Website Project Estimate", 20, 50);

    doc.setDrawColor(180);
    doc.line(20, 55, pageWidth - 20, 55);

    // ===== TABLE =====
    let y = 70;
    doc.setFontSize(12);

    const basePrice = 10000;
    const pages = parseInt(document.getElementById("pages").value);
    const extraPages = pages > 10 ? (pages - 10) * 800 : 0;

    doc.text("Base Package (10 Pages)", 25, y);
    doc.text("Rs. " + basePrice, pageWidth - 25, y, { align: "right" });
    y += 12;

    doc.text("Extra Pages", 25, y);
    doc.text("Rs. " + extraPages, pageWidth - 25, y, { align: "right" });
    y += 12;

    doc.text("Add-ons", 25, y);
    doc.text("Included if selected", pageWidth - 25, y, { align: "right" });
    y += 15;

    doc.line(20, y, pageWidth - 20, y);
    y += 15;

    // ===== TOTAL (Yellow Accent) =====
    doc.setFontSize(14);
    doc.setTextColor(255, 193, 7);
    doc.text("Total Estimate:", 25, y);
    doc.text("Rs. " + finalTotal.toFixed(2), pageWidth - 25, y, { align: "right" });

    // ===== FOOTER =====
    doc.setTextColor(120);
    doc.setFontSize(10);
    doc.text("This is a system generated estimate.", 20, pageHeight - 20);

    doc.save("Website_Estimate.pdf");
}
</script>

</body>
</html>
