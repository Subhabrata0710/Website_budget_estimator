<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Website Estimator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0d0d0d;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    background: #111;
    padding: 40px;
    border-radius: 15px;
    width: 95%;
    max-width: 750px;
    box-shadow: 0 0 40px rgba(0, 140, 255, 0.15);
    border: 1px solid #1f1f1f;
}

h1 {
    text-align: center;
    color: #00aaff;
    margin-bottom: 30px;
}

label {
    font-size: 14px;
    color: #ccc;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0 20px;
    border-radius: 8px;
    border: 1px solid #222;
    background: #1a1a1a;
    color: white;
}

.checkbox-group label {
    display: block;
    margin-bottom: 10px;
    cursor: pointer;
}

button {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

.calculate-btn {
    background: #00aaff;
    color: black;
}

.pdf-btn {
    background: #222;
    color: #00aaff;
    border: 1px solid #00aaff;
}

.result-box {
    margin-top: 30px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th {
    background: #00aaff;
    color: black;
    padding: 12px;
    text-align: left;
}

td {
    padding: 12px;
    border-bottom: 1px solid #222;
}

tr:hover {
    background: #1a1a1a;
}

.total-row td {
    font-size: 18px;
    font-weight: bold;
    color: #ffd000;
}
</style>
</head>

<body>

<div class="container">
<h1>Website Budget Estimator</h1>

<label>Number of Pages</label>
<input type="number" id="pages" value="10" min="1">

<label>Delivery Timeline (Days)</label>
<input type="number" id="days" value="7" min="1">

<div class="checkbox-group">
<label><input type="checkbox" id="service"> Additional Service (+₹2000)</label>
<label><input type="checkbox" id="database"> Database Setup (+₹1000)</label>
<label><input type="checkbox" id="email"> Auto Email Setup (+₹1000)</label>
</div>

<button class="calculate-btn" onclick="calculate()">Calculate Estimate</button>

<div class="result-box" id="resultBox" style="display:none;">
<table>
<thead>
<tr>
<th>Description</th>
<th>Amount (₹)</th>
</tr>
</thead>
<tbody id="pricingTable">
</tbody>
</table>

<button class="pdf-btn" onclick="downloadPDF()">Download PDF</button>
</div>

</div>

<script>
let finalTotal = 0;

function calculate() {
    let pages = parseInt(document.getElementById("pages").value);
    let days = parseInt(document.getElementById("days").value);

    let basePrice = 10000;
    let extraPageCost = pages > 10 ? (pages - 10) * 800 : 0;

    let urgencyMultiplier = 0;
    if (days <= 2) urgencyMultiplier = 0.35;
    else if (days <= 4) urgencyMultiplier = 0.20;
    else if (days <= 6) urgencyMultiplier = 0.10;

    let addonCost = 0;
    if (document.getElementById("service").checked) addonCost += 2000;
    if (document.getElementById("database").checked) addonCost += 1000;
    if (document.getElementById("email").checked) addonCost += 1000;

    let subtotal = basePrice + extraPageCost;
    let urgencyCost = subtotal * urgencyMultiplier;

    finalTotal = subtotal + urgencyCost + addonCost;

    document.getElementById("resultBox").style.display = "block";

    document.getElementById("pricingTable").innerHTML = `
        <tr><td>Base Package (10 Pages)</td><td>${basePrice}</td></tr>
        <tr><td>Extra Pages</td><td>${extraPageCost}</td></tr>
        <tr><td>Urgency Charges</td><td>${urgencyCost.toFixed(2)}</td></tr>
        <tr><td>Add-ons</td><td>${addonCost}</td></tr>
        <tr class="total-row"><td>Total Estimate</td><td>${finalTotal.toFixed(2)}</td></tr>
    `;
}

async function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    const pageWidth = doc.internal.pageSize.getWidth();
    const pageHeight = doc.internal.pageSize.getHeight();

    // ===== OFF WHITE BACKGROUND =====
    doc.setFillColor(248, 249, 252); // soft off-white
    doc.rect(0, 0, pageWidth, pageHeight, "F");

    // ===== BLUE HEADER =====
    doc.setFillColor(0, 170, 255);
    doc.rect(0, 0, pageWidth, 30, "F");

    doc.setTextColor(255, 255, 255);
    doc.setFontSize(18);
    doc.text("YOUR COMPANY NAME", 20, 18);

    // Reset text color
    doc.setTextColor(30, 30, 30);

    // ===== TITLE =====
    doc.setFontSize(16);
    doc.text("Website Project Estimate", 20, 50);

    doc.setDrawColor(180);
    doc.line(20, 55, pageWidth - 20, 55);

    // ===== TABLE =====
    let y = 70;
    doc.setFontSize(12);

    const basePrice = 10000;
    const pages = parseInt(document.getElementById("pages").value);
    const extraPages = pages > 10 ? (pages - 10) * 800 : 0;

    doc.text("Base Package (10 Pages)", 25, y);
    doc.text("Rs. " + basePrice, pageWidth - 25, y, { align: "right" });
    y += 12;

    doc.text("Extra Pages", 25, y);
    doc.text("Rs. " + extraPages, pageWidth - 25, y, { align: "right" });
    y += 12;

    doc.text("Add-ons", 25, y);
    doc.text("Included if selected", pageWidth - 25, y, { align: "right" });
    y += 15;

    doc.line(20, y, pageWidth - 20, y);
    y += 15;

    // ===== TOTAL (Yellow Accent) =====
    doc.setFontSize(14);
    doc.setTextColor(255, 193, 7);
    doc.text("Total Estimate:", 25, y);
    doc.text("Rs. " + finalTotal.toFixed(2), pageWidth - 25, y, { align: "right" });

    // ===== FOOTER =====
    doc.setTextColor(120);
    doc.setFontSize(10);
    doc.text("This is a system generated estimate.", 20, pageHeight - 20);

    doc.save("Website_Estimate.pdf");
}
</script>

</body>
</html>
